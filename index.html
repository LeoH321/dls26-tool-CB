<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 极品练卡 · 随机动态规划 (SDP) 引擎</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0d1117; margin: 0; padding: 20px; color: #c9d1d9; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: #161b22; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 12px; color: #58a6ff; display: flex; justify-content: space-between; align-items: center;}
        
        .sdp-badge { background: #58a6ff; color: #0d1117; font-size: 12px; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .grid-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #8b949e; font-weight: bold; text-align: center; }
        .grid-header span { flex: 1; }
        
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #21262d; padding: 12px; border-radius: 8px; }
        .row label { flex: 1.2; font-weight: bold; font-size: 15px; color: #e6edf3;}
        .row input { flex: 1; margin: 0 5px; padding: 10px 5px; border: 1px solid #30363d; border-radius: 6px; text-align: center; font-size: 16px; background: #010409; color: #fff;}
        .row input:focus { border-color: #58a6ff; outline: none;}
        
        .double-cost { color: #ff7b72; }
        .target-tackle { color: #3fb950; font-size: 18px; text-shadow: 0 0 8px rgba(63,185,80,0.4); }
        .locked-stat { opacity: 0.5; background: #090c10 !important; }
        
        .dashboard { display: flex; justify-content: space-between; background: #010409; padding: 20px; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 20px; }
        .dash-item { text-align: center; flex: 1; }
        .dash-value { font-size: 28px; font-weight: 900; margin-top: 8px; font-family: monospace;}
        
        button { width: 100%; background-color: #2ea043; color: white; border: 1px solid rgba(240,246,252,0.1); padding: 18px; font-size: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 0 15px rgba(46,160,67,0.3);}
        button:hover { background-color: #3fb950; }
        
        .result-box { margin-top: 20px; padding: 20px; border-radius: 8px; background: #161b22; border-left: 6px solid #58a6ff; display: none; border-top: 1px solid #30363d; border-right: 1px solid #30363d; border-bottom: 1px solid #30363d;}
        .prob-row { margin-top: 10px; padding: 18px; background: #0d1117; border-radius: 8px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center;}
        
        .coach-info { flex: 1; }
        .coach-name { font-weight: bold; font-size: 16px; margin-bottom: 6px; }
        .coach-detail { font-size: 12px; color: #8b949e; }
        
        .expect-info { flex: 1.5; text-align: right; }
        .expect-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .expect-val { font-size: 28px; font-weight: 900; font-family: monospace; }
        
        .best-row { border-color: rgba(63,185,80,0.6); background: rgba(63,185,80,0.05); }
        .best-val { color: #3fb950; text-shadow: 0 0 10px rgba(63,185,80,0.3); }
        
        .recommendation { margin-top: 20px; padding: 18px; background: rgba(88, 166, 255, 0.08); border-radius: 8px; border: 1px solid #58a6ff; font-size: 15px; line-height: 1.6;}
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: #f0f6fc; margin-bottom: 5px;">🎯 抢断拉满 · 终极数学引擎</h1>
    <p style="text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 30px;">基于随机动态规划 (SDP) 的 0 延迟绝对精确推演</p>

    <div class="card">
        <div class="grid-header">
            <span style="flex:1.2; text-align: left;">属性</span>
            <span>① 初始白板</span>
            <span>② 满级模板</span>
            <span>③ 当前数值</span>
        </div>
        <div id="tech-grid"></div>
    </div>

    <div class="dashboard">
        <div class="dash-item">
            <div style="color: #8b949e; font-size: 12px;">总冗余潜能</div>
            <div id="total-pool" class="dash-value" style="color: #58a6ff;">0</div>
        </div>
        <div class="dash-item" style="border-left: 1px solid #30363d; border-right: 1px solid #30363d;">
            <div style="color: #8b949e; font-size: 12px;">已消耗潜能</div>
            <div id="used-pool" class="dash-value" style="color: #ff7b72;">0</div>
        </div>
        <div class="dash-item">
            <div style="color: #8b949e; font-size: 12px;">剩余容量</div>
            <div id="remain-pool" class="dash-value" style="color: #3fb950;">0</div>
        </div>
    </div>

    <button onclick="runSDP()">🚀 启动 SDP 瞬间精确推导</button>
    <div id="result" class="result-box"></div>
</div>

<script>
    const techStats = [
        { id: 'ctrl', name: '控制', weight: 2 },
        { id: 'pass', name: '传球', weight: 1 },
        { id: 'shoot', name: '射门', weight: 1 },
        { id: 'tkl', name: '抢断', weight: 1, isTarget: true }
    ];

    function createRow(stat) {
        const labelClass = stat.weight === 2 ? 'double-cost' : (stat.isTarget ? 'target-tackle' : '');
        const icon = stat.isTarget ? '🎯 ' : '';
        const weightText = stat.weight === 2 ? '(耗2点)' : '(耗1点)';
        return `
            <div class="row" id="row_${stat.id}">
                <label class="${labelClass}">${icon}${stat.name}<br><small style="font-size:11px; color:#8b949e;">${weightText}</small></label>
                <input type="number" id="init_${stat.id}" placeholder="初始" oninput="updateDashboard()">
                <input type="number" id="target_${stat.id}" placeholder="模板" oninput="updateDashboard()">
                <input type="number" id="curr_${stat.id}" placeholder="当前" style="font-weight:bold; color:#58a6ff;" oninput="updateDashboard()">
            </div>
        `;
    }

    document.getElementById('tech-grid').innerHTML = techStats.map(s => createRow(s)).join('');

    function getVal(type, id) { return parseInt(document.getElementById(`${type}_${id}`).value) || 0; }

    window.updateDashboard = function() {
        let totalPool = 0, usedPool = 0;
        techStats.forEach(stat => {
            const init = getVal('init', stat.id);
            const target = getVal('target', stat.id);
            let curr = getVal('curr', stat.id);
            if(curr < init && curr !== 0) curr = init; 
            
            if (curr >= 100 && curr !== 0) {
                document.getElementById(`row_${stat.id}`).classList.add('locked-stat');
            } else {
                document.getElementById(`row_${stat.id}`).classList.remove('locked-stat');
            }

            totalPool += Math.max(0, target - init) * stat.weight;
            usedPool += Math.max(0, curr - init) * stat.weight;
        });

        document.getElementById('total-pool').innerText = totalPool;
        document.getElementById('used-pool').innerText = usedPool;
        let remain = totalPool - usedPool;
        document.getElementById('remain-pool').innerText = remain;
        document.getElementById('remain-pool').style.color = remain >= 12 ? "#3fb950" : (remain >= 6 ? "#d2a8ff" : "#f85149");
    }

    // 数学组合生成器
    function getCombinations(arr, k) {
        if (k >= arr.length) return [arr]; 
        let result = [];
        function run(level, start, currentCombo) {
            if (level === k) { result.push(currentCombo); return; }
            for (let i = start; i < arr.length; i++) {
                run(level + 1, i + 1, currentCombo.concat([arr[i]]));
            }
        }
        run(0, 0, []);
        return result;
    }

    // ============== 核心：Stochastic Dynamic Programming (SDP) ==============
    const memo = new Map();

    // 递归计算状态的绝对数学期望 (记忆化搜索)
    function dp(cap, ctrl, pass, shoot, tkl) {
        if (tkl >= 100) return 100;
        if (cap <= 0) return tkl;

        const key = `${cap}_${ctrl}_${pass}_${shoot}_${tkl}`;
        if (memo.has(key)) return memo.get(key);

        let pool = [];
        if (ctrl < 100) pool.push({id: 'ctrl', w: 2});
        if (pass < 100) pool.push({id: 'pass', w: 1});
        if (shoot < 100) pool.push({id: 'shoot', w: 1});
        if (tkl < 100) pool.push({id: 'tkl', w: 1});

        if (pool.length === 0) return tkl;

        let maxExpected = 0;

        // 遍历三种选择，寻找该状态下的最优解
        for (let action of [1, 2, 3]) {
            let numPicks = Math.min(action, pool.length);
            let combos = getCombinations(pool, numPicks);
            let expectedForAction = 0;

            for (let combo of combos) {
                let cost = 0;
                let hasTkl = false;
                for (let s of combo) {
                    cost += s.w * action;
                    if (s.id === 'tkl') hasTkl = true;
                }

                if (cost > cap) {
                    // 触发平分机制的精确数学结算
                    let fraction = cap / cost;
                    let gainedTkl = hasTkl ? action * fraction : 0;
                    expectedForAction += Math.min(100, tkl + gainedTkl);
                } else {
                    // 正常转移到子状态
                    let n_ctrl = Math.min(100, ctrl + (combo.some(s=>s.id==='ctrl') ? action : 0));
                    let n_pass = Math.min(100, pass + (combo.some(s=>s.id==='pass') ? action : 0));
                    let n_shoot = Math.min(100, shoot + (combo.some(s=>s.id==='shoot') ? action : 0));
                    let n_tkl = Math.min(100, tkl + (combo.some(s=>s.id==='tkl') ? action : 0));

                    expectedForAction += dp(cap - cost, n_ctrl, n_pass, n_shoot, n_tkl);
                }
            }
            // 累加所有组合的概率期望
            expectedForAction /= combos.length; 
            
            if (expectedForAction > maxExpected) {
                maxExpected = expectedForAction;
            }
        }

        memo.set(key, maxExpected);
        return maxExpected;
    }

    // 计算第一手的各个分支期望
    function evaluateRootActions(cap, ctrl, pass, shoot, tkl) {
        memo.clear(); // 清空缓存，保证本次计算新鲜
        
        let pool = [];
        if (ctrl < 100) pool.push({id: 'ctrl', w: 2});
        if (pass < 100) pool.push({id: 'pass', w: 1});
        if (shoot < 100) pool.push({id: 'shoot', w: 1});
        if (tkl < 100) pool.push({id: 'tkl', w: 1});

        let results = [];
        
        for (let action of [1, 2, 3]) {
            let numPicks = Math.min(action, pool.length);
            let combos = getCombinations(pool, numPicks);
            let expectedForAction = 0;

            for (let combo of combos) {
                let cost = 0;
                let hasTkl = false;
                for (let s of combo) {
                    cost += s.w * action;
                    if (s.id === 'tkl') hasTkl = true;
                }

                if (cost > cap) {
                    let fraction = cap / cost;
                    let gainedTkl = hasTkl ? action * fraction : 0;
                    expectedForAction += Math.min(100, tkl + gainedTkl);
                } else {
                    let n_ctrl = Math.min(100, ctrl + (combo.some(s=>s.id==='ctrl') ? action : 0));
                    let n_pass = Math.min(100, pass + (combo.some(s=>s.id==='pass') ? action : 0));
                    let n_shoot = Math.min(100, shoot + (combo.some(s=>s.id==='shoot') ? action : 0));
                    let n_tkl = Math.min(100, tkl + (combo.some(s=>s.id==='tkl') ? action : 0));

                    // 进入后续的智能求最优解递归
                    expectedForAction += dp(cap - cost, n_ctrl, n_pass, n_shoot, n_tkl);
                }
            }
            expectedForAction /= combos.length;
            results.push({ action: action, expectedTkl: expectedForAction });
        }
        return results;
    }
    // =========================================================================

    function runSDP() {
        updateDashboard();
        const cap = parseInt(document.getElementById('remain-pool').innerText);
        const resultDiv = document.getElementById('result');

        if (getVal('init', 'tkl') === 0 || getVal('target', 'tkl') === 0) { alert("请填写完整的初始和模板数据！"); return; }
        if (getVal('curr', 'tkl') >= 100) { alert("抢断已满 100，收工！"); return; }
        if (cap <= 0) { alert("潜能池已耗尽！"); return; }

        // 获取当前状态
        const ctrl = getVal('curr', 'ctrl');
        const pass = getVal('curr', 'pass');
        const shoot = getVal('curr', 'shoot');
        const tkl = getVal('curr', 'tkl');

        // 瞬间执行 SDP 计算
        const sdpResults = evaluateRootActions(cap, ctrl, pass, shoot, tkl);

        let results = [
            { name: '⚪ 普通教练', detail: '成本稳妥，概率平滑', val: sdpResults.find(r=>r.action===1).expectedTkl, color: '#e6edf3' },
            { name: '🔵 稀有教练', detail: '中等风险，中等收益', val: sdpResults.find(r=>r.action===2).expectedTkl, color: '#58a6ff' },
            { name: '👑 传奇教练', detail: '激进洗池，高风险极速满级', val: sdpResults.find(r=>r.action===3).expectedTkl, color: '#f1c40f' }
        ];

        results.sort((a, b) => b.val - a.val);
        let best = results[0];

        let html = `<h3 style="margin-top:0; color: #e6edf3; border-bottom: 1px dashed #30363d; padding-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
            <span>📉 贝尔曼方程数学推导结果</span>
            <span class="sdp-badge">SDP 极速运算完毕</span>
        </h3>`;
        
        results.forEach((res, index) => {
            let isBest = index === 0;
            // 精度提高到小数点后 3 位，展示数学引擎的威力
            let displayVal = res.val.toFixed(3); 
            html += `
                <div class="prob-row ${isBest ? 'best-row' : ''}">
                    <div class="coach-info">
                        <div class="coach-name" style="color: ${res.color}">${res.name}</div>
                        <div class="coach-detail">${res.detail}</div>
                    </div>
                    <div class="expect-info">
                        <div class="expect-label">【绝对期望值】最终抢断定格于：</div>
                        <div class="expect-val ${isBest ? 'best-val' : ''}" style="color: ${!isBest ? '#c9d1d9' : ''}">${displayVal}</div>
                    </div>
                </div>
            `;
        });

        html += `
            <div class="recommendation">
                <div style="color: #3fb950; font-weight: bold; margin-bottom: 8px;">👑 完美闭环指令：请点击【${best.name}】</div>
                本次推演已完成，摒弃模拟波动误差。系统通过 <b>Stochastic Dynamic Programming</b> 逆向计算了从当前残局走向满级的所有命运组合。数据证明，遵循此建议，你的抢断将获得<b>概率上允许的最大值</b>。
            </div>
        `;

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = html;
    }
</script>

</body>
</html>
