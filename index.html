<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 满级抢断 · 蒙特卡洛 AI 引擎 (单步推演版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0d1117; margin: 0; padding: 20px; color: #c9d1d9; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: #161b22; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 12px; color: #58a6ff; }
        
        .grid-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #8b949e; font-weight: bold; text-align: center; }
        .grid-header span { flex: 1; }
        
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #21262d; padding: 12px; border-radius: 8px; }
        .row label { flex: 1.2; font-weight: bold; font-size: 15px; color: #e6edf3;}
        .row input { flex: 1; margin: 0 5px; padding: 10px 5px; border: 1px solid #30363d; border-radius: 6px; text-align: center; font-size: 16px; background: #010409; color: #fff;}
        .row input:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 2px rgba(88,166,255,0.3);}
        
        .double-cost { color: #ff7b72; }
        .target-tackle { color: #3fb950; font-size: 18px; text-shadow: 0 0 8px rgba(63,185,80,0.4); }
        .locked-stat { opacity: 0.5; background: #090c10 !important; }
        
        .dashboard { display: flex; justify-content: space-between; background: #010409; padding: 20px; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 20px; }
        .dash-item { text-align: center; flex: 1; }
        .dash-value { font-size: 28px; font-weight: 900; margin-top: 8px; font-family: monospace;}
        
        button { width: 100%; background-color: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); padding: 18px; font-size: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:hover { background-color: #2ea043; }
        
        .result-box { margin-top: 20px; padding: 20px; border-radius: 8px; background: #161b22; border-left: 6px solid #58a6ff; display: none; border-top: 1px solid #30363d; border-right: 1px solid #30363d; border-bottom: 1px solid #30363d;}
        .prob-row { margin-top: 10px; padding: 15px; background: #0d1117; border-radius: 6px; border: 1px solid #30363d; display: flex; flex-direction: column; gap: 8px;}
        .prob-bar-row { display: flex; justify-content: space-between; align-items: center; width: 100%;}
        
        .prob-bar-container { flex: 1; margin: 0 15px; background: #21262d; height: 16px; border-radius: 8px; overflow: hidden; border: 1px solid #30363d;}
        .prob-bar { height: 100%; transition: width 0.5s ease-out; }
        
        .expect-text { font-size: 13px; color: #8b949e; text-align: left; padding-left: 5px; font-weight: bold;}
        .expect-val { color: #d2a8ff; font-family: monospace; font-size: 15px;}
        
        .recommendation { margin-top: 20px; padding: 18px; background: rgba(88, 166, 255, 0.08); border-radius: 8px; border: 1px solid #58a6ff; font-size: 15px; line-height: 1.6;}
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: #f0f6fc; margin-bottom: 5px;">🤖 AI 蒙特卡洛引擎</h1>
    <p style="text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 30px;">基于“单步最优解”推演，拒绝死板路线</p>

    <div class="card">
        <div class="grid-header">
            <span style="flex:1.2; text-align: left;">属性</span>
            <span>① 初始卡</span>
            <span>② 模板</span>
            <span>③ 当前卡</span>
        </div>
        <div id="tech-grid"></div>
    </div>

    <div class="dashboard">
        <div class="dash-item">
            <div style="color: #8b949e; font-size: 12px;">技术潜能容量</div>
            <div id="total-pool" class="dash-value" style="color: #58a6ff;">0</div>
        </div>
        <div class="dash-item" style="border-left: 1px solid #30363d; border-right: 1px solid #30363d;">
            <div style="color: #8b949e; font-size: 12px;">当前可用余额</div>
            <div id="remain-pool" class="dash-value" style="color: #3fb950;">0</div>
        </div>
    </div>

    <button onclick="runSimulation()" id="sim-btn">🚀 测算【本回合】各教练收益</button>
    <div id="result" class="result-box"></div>
</div>

<script>
    const techStats = [
        { id: 'ctrl', name: '控制', weight: 2 },
        { id: 'pass', name: '传球', weight: 1 },
        { id: 'shoot', name: '射门', weight: 1 },
        { id: 'tkl', name: '抢断', weight: 1, isTarget: true }
    ];

    function createRow(stat) {
        const labelClass = stat.weight === 2 ? 'double-cost' : (stat.isTarget ? 'target-tackle' : '');
        const icon = stat.isTarget ? '🎯 ' : '';
        const weightText = stat.weight === 2 ? '(耗2点)' : '(耗1点)';
        return `
            <div class="row" id="row_${stat.id}">
                <label class="${labelClass}">${icon}${stat.name}<br><small style="font-size:11px; color:#8b949e;">${weightText}</small></label>
                <input type="number" id="init_${stat.id}" placeholder="初始" oninput="updateDashboard()">
                <input type="number" id="target_${stat.id}" placeholder="模板" oninput="updateDashboard()">
                <input type="number" id="curr_${stat.id}" placeholder="当前" style="font-weight:bold; color:#58a6ff;" oninput="updateDashboard()">
            </div>
        `;
    }

    document.getElementById('tech-grid').innerHTML = techStats.map(s => createRow(s)).join('');

    function getVal(type, id) { return parseInt(document.getElementById(`${type}_${id}`).value) || 0; }

    window.updateDashboard = function() {
        let totalPool = 0, usedPool = 0;
        techStats.forEach(stat => {
            const init = getVal('init', stat.id);
            const target = getVal('target', stat.id);
            let curr = getVal('curr', stat.id);
            if(curr < init && curr !== 0) curr = init; 
            
            if (curr >= 100 && curr !== 0) {
                document.getElementById(`row_${stat.id}`).classList.add('locked-stat');
            } else {
                document.getElementById(`row_${stat.id}`).classList.remove('locked-stat');
            }

            totalPool += Math.max(0, target - init) * stat.weight;
            usedPool += Math.max(0, curr - init) * stat.weight;
        });

        document.getElementById('total-pool').innerText = totalPool;
        let remain = totalPool - usedPool;
        document.getElementById('remain-pool').innerText = remain;
        document.getElementById('remain-pool').style.color = remain >= 12 ? "#3fb950" : (remain >= 6 ? "#d2a8ff" : "#f85149");
    }

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex > 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // 单步推演算法：只固定第一步，后续完全由 AI 动态接管
    function simulateFirstStep(firstAction, initialState, iterations = 5000) {
        let wins = 0;
        let totalTkl = 0; 
        
        for (let i = 0; i < iterations; i++) {
            let state = { ...initialState };
            let step = 0;
            
            while (true) {
                if (state.tkl >= 100) { wins++; totalTkl += 100; break; }
                if (state.cap <= 0) { totalTkl += Math.min(100, state.tkl); break; }
                
                let pool = [];
                if (state.ctrl < 100) pool.push({id: 'ctrl', w: 2});
                if (state.pass < 100) pool.push({id: 'pass', w: 1});
                if (state.shoot < 100) pool.push({id: 'shoot', w: 1});
                if (state.tkl < 100) pool.push({id: 'tkl', w: 1});
                
                if (pool.length === 0) { totalTkl += Math.min(100, state.tkl); break; }

                let action = 1;
                if (step === 0) {
                    // 第 0 步：强行执行玩家此刻想要测试的教练
                    action = firstAction; 
                } else {
                    // 第 1 步及以后：AI 恢复理智，动态避险（只要不爆仓，能用大的绝不用小的）
                    let hasCtrl = state.ctrl < 100;
                    let maxCostL = hasCtrl ? 12 : 9;
                    let maxCostR = hasCtrl ? 6 : 4;
                    
                    if (state.cap >= maxCostL && pool.length >= 3) action = 3;
                    else if (state.cap >= maxCostR && pool.length >= 2) action = 2;
                    else action = 1;
                }

                shuffle(pool);
                let drawn = pool.slice(0, Math.min(action, pool.length));
                
                let cost = 0;
                drawn.forEach(s => cost += s.w * action);
                
                if (cost > state.cap) {
                    // 触发平分机制
                    let fraction = state.cap / cost;
                    drawn.forEach(s => {
                        if (s.id === 'tkl') state.tkl += (action * fraction);
                    });
                    totalTkl += Math.min(100, state.tkl);
                    if (state.tkl >= 100) wins++;
                    break;
                } else {
                    state.cap -= cost;
                    drawn.forEach(s => { state[s.id] += action; });
                }
                step++;
            }
        }
        return {
            winRate: (wins / iterations) * 100,
            expectedTkl: totalTkl / iterations
        };
    }

    function runSimulation() {
        updateDashboard();
        const cap = parseInt(document.getElementById('remain-pool').innerText);
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('sim-btn');

        if (getVal('curr', 'tkl') >= 100) { alert("抢断已满 100，无需再算！"); return; }
        if (cap <= 0) { alert("潜能池已空，无法训练！"); return; }

        btn.innerText = "⏳ 引擎推演中...";
        btn.style.backgroundColor = "#d2a8ff";
        btn.disabled = true;

        setTimeout(() => {
            let initialState = {
                cap: cap,
                ctrl: getVal('curr', 'ctrl'),
                pass: getVal('curr', 'pass'),
                shoot: getVal('curr', 'shoot'),
                tkl: getVal('curr', 'tkl')
            };

            // 测试：如果【本回合】分别点击普通、稀有、传奇，后续配合最优解的结果
            const resCommon = simulateFirstStep(1, initialState, 5000);
            const resRare = simulateFirstStep(2, initialState, 5000);
            const resLegend = simulateFirstStep(3, initialState, 5000);

            let results = [
                { name: '⚪ 普通教练 (+1 / 1项)', ...resCommon, color: '#e6edf3' },
                { name: '🔵 稀有教练 (+2 / 2项)', ...resRare, color: '#58a6ff' },
                { name: '👑 传奇教练 (+3 / 3项)', ...resLegend, color: '#f1c40f' }
            ];

            // 按预期收益排序
            results.sort((a, b) => {
                if (b.winRate !== a.winRate) return b.winRate - a.winRate;
                return b.expectedTkl - a.expectedTkl;
            });
            let best = results[0];

            let html = `<h3 style="margin-top:0; color: #e6edf3; border-bottom: 1px dashed #30363d; padding-bottom: 10px;">📉 【单步决策】最终推演</h3>`;
            
            results.forEach(res => {
                let barColor = res.name === best.name ? '#3fb950' : '#30363d';
                html += `
                    <div class="prob-row">
                        <div class="prob-bar-row">
                            <div style="width: 160px; font-weight: bold; color: ${res.color}">${res.name}</div>
                            <div class="prob-bar-container">
                                <div class="prob-bar" style="width: ${Math.max(res.winRate, 2)}%; background: ${barColor};"></div>
                            </div>
                            <div style="width: 60px; text-align: right; font-weight: bold;">${res.winRate.toFixed(1)}%</div>
                        </div>
                        <div class="expect-text">
                            👉 如果【本回合】点它，最终抢断预期停在：<span class="expect-val">${res.expectedTkl.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="recommendation">
                    <div style="color: #3fb950; font-weight: bold; margin-bottom: 8px;">🔥 本回合终极战术：点选【${best.name}】</div>
                    AI 已经将你此刻的点击作为起手式，并模拟了后续所有回合的“动态避险”操作。选择该教练，是此时此刻为你带来的最稳妥、榨取点数最多的选择。
                </div>
            `;

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = html;

            btn.innerText = "🚀 进入下一回合测算";
            btn.style.backgroundColor = "#238636";
            btn.disabled = false;
        }, 100); 
    }
</script>

</body>
</html>
